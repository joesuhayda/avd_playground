---
### group_vars/DC2_GATEWAY_LEAFS.yml

type: l3leaf

l3leaf:
  defaults:
    platform: cEOSLab 
    loopback_ipv4_pool: 198.18.252.0/24
    loopback_ipv4_offset: 30
    vtep_loopback_ipv4_pool: 198.18.12.0/24
    uplink_switches: [dc2-sp1, dc2-sp2, dc2-sp3] 
    virtual_router_mac_address: 00:1c:73:00:00:99 
    spanning_tree_priority: 4096 
    spanning_tree_mode: mstp 

  node_groups: 
    - group: DC2_SERVICE_LEAFS
      evpn_gateway:
        # Specific BGP EVPN Gateway functionality for route types 2 (MAC-IP), 3 (IMET) and 5 (IP-PREFIX) can be enabled separately as needed.
        evpn_l2:
          enabled: true
        evpn_l3:
          enabled: true
          inter_domain: true
      nodes:
        - name: dc2-gw1
          id: 1
          mgmt_ip: 198.18.2.31/24
          bgp_as: 4201020031
          evpn_gateway:
            # Define remote peers of the EVPN VXLAN Gateway.
            # If the hostname can be found in the inventory, ip_address and BGP ASN will be automatically populated.
            # Manual override takes precedence. If the peer's hostname can not be found in the inventory, ip_address and bgp_as must be defined.
            remote_peers:
              - hostname: dc1-gw1
              - hostname: dc1-gw2
        - name: dc2-gw2
          id: 2
          mgmt_ip: 198.18.2.32/24
          bgp_as: 4201020032
          evpn_gateway:
            remote_peers:
              - hostname: dc1-gw1
              - hostname: dc1-gw2
---
### group_vars/DC1_MEMBER_LEAFS.yml

type: l2leaf

# L2 Leaf switch group
l2leaf:
  defaults:
    platform: cEOSLab
    spanning_tree_mode: mstp

  node_groups:
    - group: DC1_ML_PAIR1
      uplink_switches: [dc1-al1, al2]
      mlag_peer_ipv4_pool: 169.254.255.254/31
      mlag_peer_ip_address: 169.254.255.254
      mlag_peer_neighbor_ip_address: 169.254.255.255
      nodes:
        - name: dc1-m1a
          id: 1
          mgmt_ip: 198.18.1.41/24
        - name: dc1-m1b
          id: 2
          mgmt_ip: 198.18.1.42/24

    - group: DC1_ML_PAIR2
      uplink_switches: [dc1-m2a, dc1-m2b]
      mlag_peer_ipv4_pool: 169.254.255.254/31
      mlag_peer_ip_address: 169.254.255.254
      mlag_peer_neighbor_ip_address: 169.254.255.255
      nodes:
        - name: dc1-m2a
          id: 1
          mgmt_ip: 198.18.1.43/24
        - name: dc1-m2b
          id: 2
          mgmt_ip: 198.18.1.44/24